<!-- ============ FadingVideo ============ -->
<script type="text/babel" data-presets="react">
  const FADE_MS = 500;
  const FADE_OUT_LEAD = 0.55;

  const FadingVideo = ({ src, className, style }) => {
    const videoRef = React.useRef(null);
    const rafRef = React.useRef(null);
    const fadingOutRef = React.useRef(false);

    React.useEffect(() => {
      const video = videoRef.current;
      if (!video) return;

      const fadeTo = (target, duration = FADE_MS) => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const start = parseFloat(video.style.opacity || "0");
        const t0 = performance.now();
        const step = (now) => {
          const p = Math.min((now - t0) / duration, 1);
          video.style.opacity = String(start + (target - start) * p);
          if (p < 1) rafRef.current = requestAnimationFrame(step);
        };
        rafRef.current = requestAnimationFrame(step);
      };

      const onLoadedData = () => {
        video.style.opacity = "0";
        video.play().catch(() => {});
        fadeTo(1);
      };

      const onTimeUpdate = () => {
        if (
          !fadingOutRef.current &&
          video.duration &&
          video.duration - video.currentTime <= FADE_OUT_LEAD &&
          video.duration - video.currentTime > 0
        ) {
          fadingOutRef.current = true;
          fadeTo(0);
        }
      };

      const onEnded = () => {
        video.style.opacity = "0";
        setTimeout(() => {
          video.currentTime = 0;
          video.play().catch(() => {});
          fadingOutRef.current = false;
          fadeTo(1);
        }, 100);
      };

      video.addEventListener("loadeddata", onLoadedData);
      video.addEventListener("timeupdate", onTimeUpdate);
      video.addEventListener("ended", onEnded);

      return () => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        video.removeEventListener("loadeddata", onLoadedData);
        video.removeEventListener("timeupdate", onTimeUpdate);
        video.removeEventListener("ended", onEnded);
      };
    }, [src]);

    return (
      <video
        ref={videoRef}
        src={src}
        autoPlay
        muted
        playsInline
        preload="auto"
        className={className}
        style={{ opacity: 0, ...style }}
      />
    );
  };
  window.FadingVideo = FadingVideo;
</script>

<!-- ============ BlurText ============ -->
<script type="text/babel" data-presets="react">
  const { motion } = window.Motion || window.FramerMotion;

  const BlurText = ({ text, className }) => {
    const ref = React.useRef(null);
    const [inView, setInView] = React.useState(false);

    React.useEffect(() => {
      const obs = new IntersectionObserver(
        ([entry]) => {
          if (entry.isIntersecting) {
            setInView(true);
            obs.disconnect();
          }
        },
        { threshold: 0.1 }
      );
      if (ref.current) obs.observe(ref.current);
      return () => obs.disconnect();
    }, []);

    const words = text.split(" ");
    const stepDuration = 0.35;

    return (
      <p
        ref={ref}
        className={className}
        style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", rowGap: "0.1em" }}
      >
        {words.map((word, i) => (
          <motion.span
            key={i}
            style={{ display: "inline-block", marginRight: "0.28em" }}
            initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
            animate={
              inView
                ? {
                    filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                    opacity: [0, 0.5, 1],
                    y: [50, -5, 0],
                  }
                : {}
            }
            transition={{
              duration: stepDuration * 2,
              times: [0, 0.5, 1],
              ease: "easeOut",
              delay: (i * 100) / 1000,
            }}
          >
            {word}
          </motion.span>
        ))}
      </p>
    );
  };
  window.BlurText = BlurText;
</script>
